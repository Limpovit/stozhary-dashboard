name: Update Jar Data

on:
  schedule:
    - cron: '0 7 * * *'   # раз на день о 10:00 Київ (07:00 UTC)
  workflow_dispatch:           # ручний запуск
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'              # уникаємо петлі від бот-коміту

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scrape.js

      - name: Commit updated data
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/jars.json data/history.json
          if ! git diff --staged --quiet; then
            git commit -m "data: update jar amounts $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "Без змін — пропускаємо коміт"
          fi
