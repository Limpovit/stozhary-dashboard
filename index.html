<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Стожари змін 2026 — Дашборд донатів</title>
<style>
  :root {
    --слова:  #7c3aed;
    --життя:  #16a34a;
    --дух:    #ea580c;
    --логіка: #2563eb;
    --bg:     #f5f5f7;
    --card:   #ffffff;
    --text:   #1a1a2e;
    --muted:  #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1e0a3c 0%, #3b0764 50%, #1e3a5f 100%);
    color: #fff;
    padding: 32px 24px 28px;
    text-align: center;
  }
  header .emoji { font-size: 2.4rem; display: block; margin-bottom: 8px; }
  header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
  header p  { font-size: 0.95rem; opacity: 0.75; margin-top: 6px; }

  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 20px 24px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    text-align: center;
    padding: 8px 20px;
  }
  .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-divider { width: 1px; background: var(--border); }

  .controls {
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
    color: var(--text);
  }
  .tab:hover { border-color: #a78bfa; }
  .tab.active {
    background: #1e0a3c;
    border-color: #1e0a3c;
    color: #fff;
  }

  .sort-select {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 0 24px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--border);
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .card-rank {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 1.1rem;
    font-weight: 800;
    opacity: 0.18;
    color: var(--text);
  }
  .card-rank.top1 { opacity: 1; font-size: 1.4rem; }

  .cat-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    color: #fff;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }
  .cat-слова  { background: var(--слова); }
  .cat-життя  { background: var(--життя); }
  .cat-духу   { background: var(--дух); }
  .cat-логіки { background: var(--логіка); }

  .card-name {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .card-grade {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .amount-block { margin-bottom: 12px; }
  .amount-value {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .amount-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .progress-wrap {
    background: var(--bg);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: -8px;
    margin-bottom: 12px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #7c3aed;
    text-decoration: none;
    border: 1.5px solid #ddd4fe;
    padding: 5px 12px;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .card-link:hover {
    background: #f5f3ff;
    border-color: #7c3aed;
  }

  .error-chip {
    font-size: 0.72rem;
    color: #ef4444;
    background: #fef2f2;
    border-radius: 6px;
    padding: 2px 8px;
    margin-top: 6px;
    display: inline-block;
  }

  .updated-bar {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    padding: 10px;
    background: var(--card);
    border-top: 1px solid var(--border);
  }

  .loading {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
    font-size: 1rem;
  }
  .loading span { display: block; margin-top: 10px; }

  @media (max-width: 480px) {
    header h1 { font-size: 1.35rem; }
    .grid { padding: 0 12px 32px; gap: 12px; }
    .amount-value { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <span class="emoji">⭐</span>
  <h1>Стожари змін 2026</h1>
  <p>Дашборд збору донатів — ACE School</p>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat">
    <div class="stat-value" id="statTotal">—</div>
    <div class="stat-label">Загалом зібрано ₴</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-value" id="statCount">—</div>
    <div class="stat-label">Учасників</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-value" id="statLeader">—</div>
    <div class="stat-label">Лідер збору</div>
  </div>
</div>

<div class="controls">
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-cat="">Всі</button>
    <button class="tab" data-cat="Вартові слова">🗣 Слова</button>
    <button class="tab" data-cat="Вартові життя">🌿 Життя</button>
    <button class="tab" data-cat="Вартові духу">🔥 Дух</button>
    <button class="tab" data-cat="Вартові логіки">🔬 Логіка</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="amount">Сортування: сума ↓</option>
    <option value="name">Сортування: ім'я</option>
    <option value="grade">Сортування: клас</option>
  </select>
</div>

<div class="grid" id="grid">
  <div class="loading">
    <div>⏳</div>
    <span>Завантаження даних...</span>
  </div>
</div>

<div class="updated-bar" id="updatedBar">Оновлення даних...</div>

<script>
const CAT_SLUG = {
  'Вартові слова':  'слова',
  'Вартові життя':  'життя',
  'Вартові духу':   'духу',
  'Вартові логіки': 'логіки',
};
const CAT_COLOR = {
  'Вартові слова':  '#7c3aed',
  'Вартові життя':  '#16a34a',
  'Вартові духу':   '#ea580c',
  'Вартові логіки': '#2563eb',
};

let allJars = [];
let activeFilter = '';
let activeSort = 'amount';

function fmt(n) {
  if (n == null) return '—';
  return n.toLocaleString('uk-UA');
}

function pct(amount, goal) {
  if (!goal || goal === 0) return null;
  return Math.min(100, Math.round(amount / goal * 100));
}

function rankEmoji(rank) {
  if (rank === 1) return '🥇';
  if (rank === 2) return '🥈';
  if (rank === 3) return '🥉';
  return `#${rank}`;
}

function renderStats(jars) {
  const withData = jars.filter(j => j.amountNum != null);
  const total = withData.reduce((s, j) => s + j.amountNum, 0);
  document.getElementById('statTotal').textContent = fmt(total);
  document.getElementById('statCount').textContent = jars.length;

  const leader = [...jars].sort((a, b) => (b.amountNum || 0) - (a.amountNum || 0))[0];
  if (leader && leader.amountNum) {
    const name = leader.student.split(' ')[0]; // перше ім'я
    document.getElementById('statLeader').textContent = name;
  }
}

function renderGrid(jars) {
  const filtered = activeFilter
    ? jars.filter(j => j.category === activeFilter)
    : jars;

  const sorted = [...filtered].sort((a, b) => {
    if (activeSort === 'amount') return (b.amountNum || -1) - (a.amountNum || -1);
    if (activeSort === 'name')  return a.student.localeCompare(b.student, 'uk');
    if (activeSort === 'grade') return parseInt(a.grade) - parseInt(b.grade);
    return 0;
  });

  // Build global rank by amount for all jars (not filtered)
  const ranked = [...jars]
    .filter(j => j.amountNum != null)
    .sort((a, b) => b.amountNum - a.amountNum);
  const rankMap = {};
  ranked.forEach((j, i) => rankMap[j.id] = i + 1);

  const grid = document.getElementById('grid');
  if (sorted.length === 0) {
    grid.innerHTML = '<div class="loading"><span>Немає даних</span></div>';
    return;
  }

  grid.innerHTML = sorted.map(jar => {
    const rank = rankMap[jar.id];
    const slug = CAT_SLUG[jar.category] || '';
    const color = CAT_COLOR[jar.category] || '#666';
    const p = jar.amountNum != null && jar.goalNum ? pct(jar.amountNum, jar.goalNum) : null;

    return `
    <div class="card">
      <div class="card-rank ${rank === 1 ? 'top1' : ''}">${rank ? rankEmoji(rank) : ''}</div>
      <span class="cat-badge cat-${slug}">${jar.category}</span>
      <div class="card-name">${jar.student}</div>
      <div class="card-grade">${jar.grade} клас</div>
      <div class="amount-block">
        <div class="amount-value">${jar.amountText || '—'}</div>
        <div class="amount-label">зібрано</div>
      </div>
      ${p !== null ? `
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${p}%;background:${color}"></div>
        </div>
        <div class="progress-label">${p}% від мети ${jar.goalText}</div>
      ` : ''}
      <a class="card-link" href="${jar.jarUrl}" target="_blank" rel="noopener">
        💳 Задонатити
      </a>
      ${jar.hasError ? '<div class="error-chip">⚠ дані застарілі</div>' : ''}
    </div>`;
  }).join('');
}

function render() {
  renderStats(allJars);
  renderGrid(allJars);
}

// Filter tabs
document.getElementById('filterTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter = tab.dataset.cat;
  renderGrid(allJars);
});

// Sort select
document.getElementById('sortSelect').addEventListener('change', e => {
  activeSort = e.target.value;
  renderGrid(allJars);
});

// Load data
async function loadData() {
  try {
    const res = await fetch('data/jars.json?_=' + Date.now());
    const data = await res.json();

    if (!data.jars || data.jars.length === 0) {
      document.getElementById('grid').innerHTML =
        '<div class="loading"><span>Дані ще збираються... Зачекайте першого запуску GitHub Actions.</span></div>';
      return;
    }

    allJars = data.jars;
    render();

    if (data.updatedAt) {
      const dt = new Date(data.updatedAt);
      document.getElementById('updatedBar').textContent =
        'Дані оновлено: ' + dt.toLocaleString('uk-UA', { dateStyle: 'short', timeStyle: 'short' });
    }
  } catch (err) {
    document.getElementById('grid').innerHTML =
      '<div class="loading"><span>Помилка завантаження даних 😔</span></div>';
  }
}

loadData();
</script>
</body>
</html>
